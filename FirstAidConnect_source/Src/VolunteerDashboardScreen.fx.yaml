        HoverColor: |-
            =ColorValue("#FFFFFF")
        HoverFill: |-
            =ColorValue("#15803D")
        OnSelect: |-
            =Patch(
                Volunteers,
                varCurrentVolunteer,
                {
                    Status: {Value: "Available"},
                    CurrentTask: ""
                }
            );
            
            Set(
                varCurrentVolunteer,
                LookUp(Volunteers, ID = varCurrentVolunteer.ID)
            );
            
            Notify(
                "Status updated to Available.",
                NotificationType.Success
            )
        PressedBorderColor: =App.Theme.Colors.Darker40
