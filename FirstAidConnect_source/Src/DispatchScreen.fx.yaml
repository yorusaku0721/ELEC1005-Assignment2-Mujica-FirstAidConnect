    btnDispatchVolunteer As button:
        BorderColor: =App.Theme.Colors.Primary
        BorderThickness: =0
        Color: =Color.White
        DisabledBorderColor: =RGBA(244, 244, 244, 1)
        DisabledColor: =RGBA(166, 166, 166, 1)
        DisabledFill: =RGBA(244, 244, 244, 1)
        DisplayMode: |-
            =If(
                IsBlank(varSelectedIncident) || IsBlank(varSelectedVolunteer),
                DisplayMode.Disabled,
                DisplayMode.Edit
            )
        Fill: |-
            =ColorValue("#DC2626")
        Font: =App.Theme.Font
        FontWeight: =FontWeight.Bold
        Height: =61
        HoverBorderColor: =App.Theme.Colors.Darker10
        HoverColor: =App.Theme.Colors.PrimaryForeground
        HoverFill: =App.Theme.Colors.Darker10
        OnSelect: |-
            =Patch(
                Incidents,
                varSelectedIncident,
                {
                    AssignedVolunteer: varSelectedVolunteer.Name,
                    Status: {Value: "Assigned"}
                }
            );
            
            Patch(
                Volunteers,
                varSelectedVolunteer,
                {
                    Status: {Value: "Responding"},
                    CurrentTask: varSelectedIncident.IncidentID
                }
            );
            
            Notify(
                "Volunteer dispatched successfully.",
                NotificationType.Success
            );
            
            Refresh(Incidents);
            Refresh(Volunteers);
            
            Navigate(AdminDashboardScreen, ScreenTransition.Fade)
        PressedBorderColor: =App.Theme.Colors.Darker40
        PressedColor: =Self.Color
        PressedFill: =App.Theme.Colors.Darker40
        Size: =24
        Text: ="DISPATCH VOLUNTEER"
        Width: =561
        X: =40
        Y: =990
        ZIndex: =9

