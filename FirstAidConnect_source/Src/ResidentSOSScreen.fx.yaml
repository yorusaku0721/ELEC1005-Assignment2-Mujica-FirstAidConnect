    btnSubmitSOS As modernButton:
        BasePaletteColor: |-
            =ColorValue("#DC2626")
        Color: =Color.White
        FontWeight: =FontWeight.Bold
        Height: =64
        OnSelect: |-
            =If(
                IsBlank(drpIncidentType.Selected.Value) || IsBlank(txtLocation.Text),
            
                Notify(
                    "Please select an incident type and enter your location.",
                    NotificationType.Error
                ),
            
                Set(
                varNewIncidentID,
                "INC-" & Text(Today(), "yyyymmdd") & "-" & Text(CountRows(Incidents) + 1, "000")
            );
            
                Patch(
                    Incidents,
                    Defaults(Incidents),
                    {
                        Title: varNewIncidentID,
                        IncidentID: varNewIncidentID,
                        Types: {Value: drpIncidentType.Selected.Value},
                        Location: txtLocation.Text,
                        Priority: {Value: "Critical"},
                        Notes: txtNotes.Text,
                        Status: {Value: "New"},
                        AssignedVolunteer: "",
                        CreatedTime: Now()
                    }
                );
            
                Notify(
                    "SOS submitted. Help is on the way.",
                    NotificationType.Success
                );
            
                Navigate(
                    SOSConfirmationScreen,
                    ScreenTransition.Fade
                )
            )
        RadiusBottomLeft: =8
        RadiusBottomRight: =8
        RadiusTopLeft: =8
        RadiusTopRight: =8
        Size: =34
        Text: ="SUBMIT SOS"
        Width: =481
        X: =74
        Y: =941
        ZIndex: =12

