    btnCreateShift As button:
        BorderColor: =App.Theme.Colors.Primary
        Color: =Color.White
        DisabledBorderColor: =RGBA(244, 244, 244, 1)
        DisabledColor: =RGBA(166, 166, 166, 1)
        DisabledFill: =RGBA(244, 244, 244, 1)
        Fill: |-
            =ColorValue("#2563EB")
        Font: =App.Theme.Font
        FontWeight: =FontWeight.Bold
        Height: =61
        HoverBorderColor: =App.Theme.Colors.Darker10
        HoverColor: =App.Theme.Colors.PrimaryForeground
        HoverFill: =App.Theme.Colors.Darker10
        OnSelect: |-
            =If(
                IsBlank(drpShiftVolunteer.Selected.Name) ||
                IsBlank(dateShift.SelectedDate) ||
                IsBlank(txtStartTime.Text) ||
                IsBlank(txtEndTime.Text) ||
                IsBlank(drpShiftRole.Selected.Value) ||
                IsBlank(drpShiftSector.Selected.Value),
            
                Notify(
                    "Please complete all shift fields.",
                    NotificationType.Error
                ),
            
                Set(
                    varNewShiftID,
                    "S-" & Text(Today(), "yyyymmdd") & "-" & Text(CountRows(Shifts) + 1, "000")
                );
            
                Patch(
                    Shifts,
                    Defaults(Shifts),
                    {
                        Title: varNewShiftID,
                        ShiftID: varNewShiftID,
                        VolunteerName: drpShiftVolunteer.Selected.Name,
                        ShiftDate: dateShift.SelectedDate,
                        StartTime: txtStartTime.Text,
                        EndTime: txtEndTime.Text,
                        Role: {Value: drpShiftRole.Selected.Value},
                        Sector: {Value: drpShiftSector.Selected.Value}
                    }
                );
            
                Notify(
                    "Shift created successfully.",
                    NotificationType.Success
                );
            
                Reset(txtStartTime);
                Reset(txtEndTime);
            
                Navigate(
                    AdminDashboardScreen,
                    ScreenTransition.Fade
                )
            )
        PressedBorderColor: =App.Theme.Colors.Darker40
        PressedColor: =Self.Color
        PressedFill: =App.Theme.Colors.Darker40
        Size: =24
        Text: ="CREATE SHIFT"
        Width: =575
        X: =33
        Y: =1034
        ZIndex: =16

