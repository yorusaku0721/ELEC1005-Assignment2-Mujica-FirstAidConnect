    btnMarkResolved As button:
        BorderColor: |-
            =ColorValue("#16A34A")
        BorderThickness: =1
        Color: |-
            =ColorValue("#FFFFFF")
        DisabledBorderColor: =RGBA(244, 244, 244, 1)
        DisabledColor: =RGBA(166, 166, 166, 1)
        DisabledFill: =RGBA(244, 244, 244, 1)
        DisplayMode: |-
            =If(
                IsBlank(varCurrentIncident),
                DisplayMode.Disabled,
                DisplayMode.Edit
            )
        Fill: |-
            =ColorValue("#16A34A")
        Font: =App.Theme.Font
        FontWeight: =FontWeight.Bold
        Height: =70
        HoverBorderColor: =App.Theme.Colors.Darker10
        HoverColor: |-
            =ColorValue("#FFFFFF")
        HoverFill: |-
            =ColorValue("#15803D")
        OnSelect: |-
            =Patch(
                Incidents,
                varCurrentIncident,
                {
                    Status: {Value: "Resolved"}
                }
            );
            
            Patch(
                Volunteers,
                varCurrentVolunteer,
                {
                    Status: {Value: "Available"},
                    CurrentTask: ""
                }
            );
            
            Refresh(Incidents);
            Refresh(Volunteers);
            
            Set(
                varCurrentIncident,
                LookUp(
                    Incidents,
                    IncidentID = varCurrentIncident.IncidentID
                )
            );
            
            Set(
                varCurrentVolunteer,
                LookUp(
                    Volunteers,
                    ID = varCurrentVolunteer.ID
                )
            );
            
            Notify(
                "Incident marked as resolved.",
                NotificationType.Success
            );
            
            Navigate(
                VolunteerDashboardScreen,
                ScreenTransition.Fade
            )
        PressedBorderColor: =App.Theme.Colors.Darker40
        PressedColor: |-
            =ColorValue("#FFFFFF")
        PressedFill: |-
            =ColorValue("#166534")
        Size: =24
        Text: ="MARK AS RESOLVED"
        Width: =560
        X: =40
        Y: =878
        ZIndex: =15

