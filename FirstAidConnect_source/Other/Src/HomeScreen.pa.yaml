Screens:
  HomeScreen:
    Properties:
      Fill: =ColorValue("#F8FAFC")
    Children:
      - lblAppTitle:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =ColorValue("#0F172A")
            FontWeight: =FontWeight.Bold
            Height: =93
            LineHeight: |+
              =1.2

            Size: =32
            Text: ="FirstAid Connect"
            Width: =433
            X: =104
            Y: =140
      - lblSubtitle:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =ColorValue("#64748B")
            Height: =62
            Size: =13
            Text: ="Community-first rapid response platform connecting residents, volunteers, and administrators during events and emergencies."
            Width: =575
            X: =32
            Y: =233
      - Image3:
