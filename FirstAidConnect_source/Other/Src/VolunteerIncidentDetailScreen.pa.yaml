Screens:
  VolunteerIncidentDetailScreen:
    Properties:
      Fill: =ColorValue("#F8FAFC")
    Children:
      - btnAdminBack_3:
          Control: ModernButton@1.0.0
          Properties:
            Align: =Align.Justify
            Appearance: =ButtonAppearance.Secondary
            BasePaletteColor: =Color.Transparent
            BorderColor: =Color.Transparent
            BorderStyle: =BorderStyle.None
            BorderThickness: =0
            Color: =ColorValue("#2563EB")
            OnSelect: =Navigate(VolunteerDashboardScreen, ScreenTransition.Fade)
            RadiusBottomLeft: =10
            RadiusBottomRight: =10
            RadiusTopLeft: =10
            RadiusTopRight: =10
            Text: ="< Back"
            Width: =113
            X: =10
            Y: =5
      - lblIncidentDetailTitle:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =ColorValue("#0F172A")
            FontWeight: =FontWeight.Bold
            Size: =34
            Text: ="Incident Detail"
            Width: =429
            X: =106
            Y: =43
      - lblIncidentDetailSubtitle:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =ColorValue("#64748B")
            Size: =16
            Text: ="Review the assigned incident before responding or resolving."
            X: =40
            Y: =95
      - btnIncidentDetailCard:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorValue("#E2E8F0")
            DisabledBorderColor: =ColorValue("#E2E8F0")
            DisabledFill: =Color.White
            DisplayMode: =DisplayMode.Disabled
            Fill: =Color.White
            Height: =662
            Text: =""
            Width: =560
            X: =40
            Y: =185
      - lblDetailIncidentID:
          Control: Label@2.5.1
          Properties:
            Color: =ColorValue("#0F172A")
            FontWeight: =FontWeight.Bold
            Size: =30
            Text: |-
              =If(
                  IsBlank(varCurrentIncident),
                  "No incident selected",
                  varCurrentIncident.IncidentID
              )
            Width: =496
            X: =72
            Y: =212
      - lblDetailType:
          Control: Label@2.5.1
          Properties:
            Color: =ColorValue("#334155")
            Text: |-
              ="Type: " & varCurrentIncident.Types.Value
            Width: =430
            X: =72
            Y: =282
      - lblDetailLocation:
          Control: Label@2.5.1
          Properties:
            Color: =ColorValue("#334155")
            Text: |-
              ="Location: " & varCurrentIncident.Location
            Width: =528
            X: =72
            Y: =352
      - lblDetailPriority:
          Control: Label@2.5.1
          Properties:
            Color: =ColorValue("#334155")
            FontWeight: =FontWeight.Semibold
            Height: =54
            Text: |-
              ="Priority: "
            Width: =115
            X: =72
            Y: =434
      - lblGalPriority_3:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: |-
              =Switch(
                  varCurrentIncident.Priority.Value,
                  "Critical", ColorValue("#FCA5A5"),
                  "Moderate", ColorValue("#86EFAC"),
                  "Low", ColorValue("#FCD34D"),
                  ColorValue("#CBD5E1")
              )
            Color: |-
              =Switch(
                  varCurrentIncident.Priority.Value,
                  "Critical", ColorValue("#B91C1C"),
                  "Moderate", ColorValue("#166534"),
                  "Low", ColorValue("#92400E"),
                  ColorValue("#334155")
              )
            DisplayMode: =DisplayMode.View
            Fill: |-
              =Switch(
                  varCurrentIncident.Priority.Value,
                  "Critical", ColorValue("#FEF2F2"),
                  "Moderate", ColorValue("#DCFCE7"),
                  "Low", ColorValue("#FEF3C7"),
                  ColorValue("#F1F5F9")
              )
            Height: =38
            RadiusBottomLeft: =25
            RadiusBottomRight: =25
            RadiusTopLeft: =25
            RadiusTopRight: =25
            Size: =14
            Text: =varCurrentIncident.Priority.Value
            Width: =100
            X: =187
            Y: =445
      - lblDetailStatus:
          Control: Label@2.5.1
          Properties:
            Color: =ColorValue("#334155")
            FontWeight: =FontWeight.Semibold
            Height: =50
            Text: |-
              ="Status: "
            Width: =107
            X: =72
            Y: =503
      - lblGalStatus_1:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: |-
              =Switch(
                  varCurrentIncident.Status.Value,
                  "New", ColorValue("#BFDBFE"),
                  "Assigned", ColorValue("#86EFAC"),
                  "Resolved", ColorValue("#FCD34D"),
                  ColorValue("#CBD5E1")
              )
            Color: |-
              =Switch(
                  varCurrentIncident.Status.Value,
                  "New", ColorValue("#1D4ED8"),
                  "Assigned", ColorValue("#166534"),
                  "Resolved", ColorValue("#92400E"),
                  ColorValue("#334155")
              )
            DisplayMode: =DisplayMode.View
            Fill: |-
              =Switch(
                  varCurrentIncident.Status.Value,
                  "New", ColorValue("#DBEAFE"),
                  "Assigned", ColorValue("#DCFCE7"),
                  "Resolved", ColorValue("#FEF3C7"),
                  ColorValue("#F1F5F9")
              )
            Height: =38
            RadiusBottomLeft: =25
            RadiusBottomRight: =25
            RadiusTopLeft: =25
            RadiusTopRight: =25
            Size: =14
            Text: =varCurrentIncident.Status.Value
            Width: =100
            X: =187
            Y: =514
      - lblDetailAssignedVolunteer:
          Control: Label@2.5.1
          Properties:
            Color: =ColorValue("#334155")
            Text: |-
              ="Assigned Volunteer: " & varCurrentIncident.AssignedVolunteer
            Width: =528
            X: =72
            Y: =558
      - lblDetailNotesTitle:
          Control: Label@2.5.1
          Properties:
            Color: =ColorValue("#0F172A")
            FontWeight: =FontWeight.Bold
            Height: =47
            Size: =24
            Text: ="Notes"
            Width: =99
            X: =72
            Y: =643
      - lblDetailNotes:
          Control: Label@2.5.1
          Properties:
            Color: =ColorValue("#64748B")
            Height: =127
            Text: |-
              =If(
                  IsBlank(varCurrentIncident.Notes),
                  "No additional notes provided.",
                  varCurrentIncident.Notes
              )
            VerticalAlign: =VerticalAlign.Top
            Width: =520
            X: =72
            Y: =700
      - btnMarkResolved:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorValue("#16A34A")
            BorderThickness: =1
            Color: =ColorValue("#FFFFFF")
            DisplayMode: |-
              =If(
                  IsBlank(varCurrentIncident),
                  DisplayMode.Disabled,
                  DisplayMode.Edit
              )
            Fill: =ColorValue("#16A34A")
            FontWeight: =FontWeight.Bold
            HoverColor: =ColorValue("#FFFFFF")
            HoverFill: =ColorValue("#15803D")
            OnSelect: |-
              =Patch(
                  Incidents,
                  varCurrentIncident,
                  {
                      Status: {Value: "Resolved"}
                  }
              );

              Patch(
                  Volunteers,
                  varCurrentVolunteer,
                  {
                      Status: {Value: "Available"},
                      CurrentTask: ""
                  }
              );

              Refresh(Incidents);
              Refresh(Volunteers);

              Set(
                  varCurrentIncident,
                  LookUp(
                      Incidents,
                      IncidentID = varCurrentIncident.IncidentID
                  )
              );

              Set(
                  varCurrentVolunteer,
                  LookUp(
                      Volunteers,
                      ID = varCurrentVolunteer.ID
                  )
              );

              Notify(
                  "Incident marked as resolved.",
                  NotificationType.Success
              );

              Navigate(
                  VolunteerDashboardScreen,
                  ScreenTransition.Fade
              )
            PressedColor: =ColorValue("#FFFFFF")
            PressedFill: =ColorValue("#166534")
            Text: ="MARK AS RESOLVED"
            Width: =560
            X: =40
            Y: =878
      - btnDetailBackToDashboard:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorValue("#2563EB")
            BorderThickness: =1
            Color: =ColorValue("#2563EB")
            Fill: =ColorValue("#FFFFFF")
            FontWeight: =FontWeight.Bold
            HoverBorderColor: =ColorValue("#1D4ED8")
            HoverColor: =ColorValue("#1D4ED8")
            HoverFill: =ColorValue("#EFF6FF")
            OnSelect: =Navigate(VolunteerDashboardScreen, ScreenTransition.Fade)
            PressedBorderColor: =ColorValue("#1E40AF")
            PressedColor: =ColorValue("#1E40AF")
            PressedFill: =ColorValue("#DBEAFE")
            Text: ="Back to Volunteer Dashboard"
            Width: =560
            X: =40
            Y: =983
      - Image15_1:
          Control: Image@2.2.3
          Properties:
            Height: =43
            Image: ='69'
            Width: =43
            X: =436
            Y: =365
